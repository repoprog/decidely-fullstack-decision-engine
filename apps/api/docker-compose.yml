version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: decidely-db
    environment:
      POSTGRES_DB: decidely
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: