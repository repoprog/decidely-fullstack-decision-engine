spring:
  application:
    name:  decidely-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  config:
    import: optional:file:.env[.properties]

  threads:
    virtual:
      enabled: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000} # 15 minutes
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000} # 7 days

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

server:
  tomcat:
    max-http-form-post-size: ${MAX_HTTP_FORM_POST_SIZE:2097152} # 2MB

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

  security:
    cookies:
      secure: ${COOKIE_SECURE:true}
      same-site: ${COOKIE_SAME_SITE:Lax}

  demo:
    enabled: ${DEMO_LOGIN_ENABLED:false}
    email: ${DEMO_USER_EMAIL:}
    password: ${DEMO_USER_PASSWORD:}
    name: ${DEMO_USER_NAME:Demo User}

  setup:
    admin:
      enabled: ${ADMIN_SETUP_ENABLED:false}
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
      name: ${ADMIN_NAME:Administrator}

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:decidely}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  mvc:
    async:
      request-timeout: ${MVC_ASYNC_REQUEST_TIMEOUT:10000}

app:
  security:
    cookies:
      secure: ${COOKIE_SECURE:false}
      same-site: ${COOKIE_SAME_SITE:Lax}

  demo:
    enabled: ${DEMO_LOGIN_ENABLED:true}
    email: ${DEMO_USER_EMAIL:}
    password: ${DEMO_USER_PASSWORD:}
    name: ${DEMO_USER_NAME:Demo User}

  setup:
    admin:
      enabled: ${ADMIN_SETUP_ENABLED:true}
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
      name: ${ADMIN_NAME:Główny Administrator}

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mvc:
    async:
      request-timeout: ${MVC_ASYNC_REQUEST_TIMEOUT:10000}

app:
  security:
    cookies:
      secure: ${COOKIE_SECURE:true}
      same-site: ${COOKIE_SAME_SITE:None}

  demo:
    enabled: ${DEMO_LOGIN_ENABLED:false}
    email: ${DEMO_USER_EMAIL:}
    password: ${DEMO_USER_PASSWORD:}
    name: ${DEMO_USER_NAME:Demo User}

  setup:
    admin:
      enabled: ${ADMIN_SETUP_ENABLED:false}
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
      name: ${ADMIN_NAME:Administrator}


---
spring:
  config:
    activate:
      on-profile: test

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  mvc:
    async:
      request-timeout: 10000

app:
  security:
    cookies:
      secure: false
      same-site: Lax

  demo:
    enabled: ${DEMO_LOGIN_ENABLED:true}
    email: ${DEMO_USER_EMAIL:demo@test.local}
    password: ${DEMO_USER_PASSWORD:demo-test-password}
    name: ${DEMO_USER_NAME:Demo User}

  setup:
    admin:
      enabled: ${ADMIN_SETUP_ENABLED:false}
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
      name: ${ADMIN_NAME:Administrator}